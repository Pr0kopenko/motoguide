name: Проверка проекта

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Скачать проект
        uses: actions/checkout@v4

      - name: Подготовить Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Установить зависимости
        run: npm ci

      - name: Проверить код
        run: npm run lint

      - name: Собрать и протестировать
        run: npm test
